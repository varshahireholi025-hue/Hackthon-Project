<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Smart AgriMarket</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';

    background:url("https://images.unsplash.com/photo-1605000797499-95a51c5269ae?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    color:white;
}

body::before{
content:"";
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* LOGIN */
.login{
width:300px;
margin:100px auto;
padding:20px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:15px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
width:95%;
background:#00c853;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

/* APP */
.container{padding:20px;max-width:900px;margin:auto;display:none;}

.card{
background:rgba(255,255,255,0.2);
padding:15px;
margin:15px 0;
border-radius:15px;
backdrop-filter:blur(10px);
}

.best{
border-left:5px solid #00ff88;
}

/* SELECT */
select{width:100%;padding:10px;color:black;}

canvas{width:100%;}
</style>
</head>

<body>
    <input type="text" id="name" placeholder="Enter your name">
    <button onclick="submitName()">Send</button>
    <p id="result"></p>

<!-- LOGIN -->
<div class="login" id="loginPage">
<h2>🌾 Farmer Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>



<p id="output"></p>
<p id="msg"></p>
</div>

<!-- MAIN APP -->
<div class="container" id="app">

<h2>🌾 Smart AgriMarket - Belagavi</h2>

<select onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="kn">Kannada</option>
<option value="hi">Hindi</option>
</select>

<h3 id="selectText">Select Crop</h3>

<select onchange="loadData(this.value)">
<option value="">--Choose--</option>
<option value="rice">Rice</option>
<option value="wheat">Wheat</option>
<option value="maize">Maize</option>
<option value="ragi">Ragi</option>
<option value="jowar">Jowar</option>
</select>

<div id="marketData"></div>

<div class="card">
<h3>📊 Price Trend</h3>
<canvas id="chart" width="400" height="200"></canvas>
</div>

<div class="card">
<h3>📍 Nearby Markets</h3>
<p>📌 Belagavi APMC — <b>2 km</b> | Mon–Sat</p>
<p>📌 Gokak Market — <b>45 km</b> | Tue, Fri</p>
<p>📌 Athani Market — <b>60 km</b> | Wed, Sat</p>
<p>📌 Raibag Market — <b>55 km</b> | Mon, Thu</p>
<a href="https://maps.google.com/?q=Belagavi+APMC" target="_blank">
<button>🗺️ Open in Google Maps</button>
</a>
</div>

<div class="card">
<h3>🤖 Smart Recommendation</h3>
<div id="recommendation"></div>
</div>

</div>

<script>
    function submitName() {
    let name = document.getElementById("name").value.trim();
    if (name === "") {
        document.getElementById("result").innerText = "Please enter your name!";
        return;
    }
    // Hide name input, show login page
    document.getElementById("result").innerText = "Welcome, " + name + "!";
    document.querySelector(".login").style.display = "block";
}
    function fetchData() {
    fetch("/data")
    .then(response => response.json())
    .then(data => {
        document.getElementById("output").innerHTML =
            "Crop: " + data.crop + "<br>" +
            "Price: " + data.price + "<br>" +
            "District: " + data.district;
    });
}
// LOGIN
function login(){
if(user.value==="farmer" && pass.value==="1234"){
loginPage.style.display="none";
app.style.display="block";
}else msg.innerText="Invalid Login";
}

// LANGUAGE
const translations={
en:"Select Crop",
kn:"ಬೆಳೆ ಆಯ್ಕೆ ಮಾಡಿ",
hi:"फसल चुनें"
};

function changeLang(l){
selectText.innerText=translations[l];
}

// DATA (BELAGAVI)
const data={
rice:[{market:"Belagavi APMC",price:2250},{market:"Gokak",price:2150}],
wheat:[{market:"Belagavi APMC",price:1900},{market:"Gokak",price:1850}],
maize:[{market:"Belagavi APMC",price:2000},{market:"Athani",price:1950}],
ragi:[{market:"Belagavi APMC",price:2450},{market:"Gokak",price:2400}],
jowar:[{market:"Belagavi APMC",price:2100},{market:"Athani",price:2050}]
};

// LOAD DATA
function loadData(crop){

let markets=data[crop].map(m=>{
let last=m.price;
let live=last+Math.floor(Math.random()*40-20);

return {market:m.market,last:last,live:live,diff:live-last};
});

display(markets);
drawChart(markets.map(m=>({market:m.market,price:m.live})));
recommend(markets);
}

// DISPLAY
function display(markets){

let max=Math.max(...markets.map(m=>m.live));

marketData.innerHTML=markets.map(m=>{

let trend=m.diff>0?"📈 +":m.diff<0?"📉 ":"➖";

return `
<div class="card ${m.live===max?'best':''}">
<h4>${m.market}</h4>
<p>Last: ₹${m.last}</p>
<p><b>Live: ₹${m.live}</b></p>
<p>${trend}${m.diff}</p>
</div>`;
}).join("");
}

// CHART
function drawChart(markets){
let c=chart,ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let max=Math.max(...markets.map(m=>m.price)),x=40;

markets.forEach(m=>{
let h=(m.price/max)*150;
ctx.fillStyle="#2e7d32";
ctx.fillRect(x,180-h,50,h);
ctx.fillStyle="white";
ctx.fillText("₹"+m.price,x,170-h);
x+=80;
});
}

// RECOMMENDATION
function recommend(markets){

let best=markets.reduce((a,b)=>a.live>b.live?a:b);
let avg=markets.reduce((s,m)=>s+m.live,0)/markets.length;

// WEATHER
let weather=["Sunny","Rainy","Cloudy"][Math.floor(Math.random()*3)];

let advice=
best.live>avg?"🔥 SELL NOW":
best.live<avg?"📉 WAIT":"⚖️ STABLE";

let weatherAdvice=
weather==="Rainy"?"Sell early 🌧":
weather==="Sunny"?"Wait ☀️":"Monitor 🌥";

recommendation.innerHTML=`
<p><b>Best Market:</b> ${best.market}</p>
<p><b>Price:</b> ₹${best.live}</p>
<p><b>Weather:</b> ${weather}</p>
<p><b>Advice:</b> ${advice}</p>
<p><b>Tip:</b> ${weatherAdvice}</p>
`;
}

// AUTO LIVE UPDATE
setInterval(()=>{
let crop=document.querySelectorAll("select")[1].value;
if(crop) loadData(crop);
},5000);

</script>
<script src="script.js"></script>


</body>
</html>
